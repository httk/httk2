name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_suffix:
        description: >-
          Optional PEP 440 suffix appended to project.version for this
          TestPyPI build (e.g. .post1, rc2, .dev1)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Require the release tag to match the package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected_tag:
              raise SystemExit(
                  f"release tag {os.environ['RELEASE_TAG']!r} does not match {expected_tag!r}"
              )
          PY

      - name: Apply version suffix (TestPyPI dry runs only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_suffix != ''
        env:
          VERSION_SUFFIX: ${{ github.event.inputs.version_suffix }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'^version = "([^"]+)"', text, flags=re.M)
          if match is None:
              raise SystemExit("could not find project.version in pyproject.toml")
          version = match.group(1) + os.environ["VERSION_SUFFIX"]
          path.write_text(text[: match.start(1)] + version + text[match.end(1) :])
          print(f"building as version {version}")
          PY

      - name: Install release dependencies
        run: python -m pip install -e ".[release]"

      - name: Build and check distributions
        run: make release-check

      - name: Verify the built wheel declares its runtime dependencies
        run: |
          python -m venv /tmp/httk2-wheel-test
          /tmp/httk2-wheel-test/bin/python -m pip install --no-deps dist/*.whl
          metadata=$(unzip -p dist/*.whl '*.dist-info/METADATA')
          echo "$metadata" | grep '^Requires-Dist:'
          for dep in httk-core httk-io httk-atomistic; do
            echo "$metadata" | grep -q "^Requires-Dist: $dep" || {
              echo "missing Requires-Dist for $dep"; exit 1; }
          done

      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/httk2
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/httk2
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
